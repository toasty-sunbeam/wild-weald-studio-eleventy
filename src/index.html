<!DOCTYPE html>
<head>
	<link rel="stylesheet" href="css/style.css">
</head>

<style>
	html {
		width: 100%;
		height: 100%;
	}
	body {
		width: 100%;
		height: 100%;
		background-color: #3F4138;
		display: flex;
		flex-direction: row;
	}
	header {
		background-color: white;
	}
	main {
		height: 100%;
		flex-grow: 1;
	}
	.main-wrapper {
		position: relative;
		width: min(100%, calc(100vh * 2480 / 1857));
	}
	.hero {
		width: 100%;
		height: auto;
		display: block;
	}
	.main-col {
		position: absolute;
		display: flex;
		flex-direction: column;
		z-index: 1;

		margin-left: 60%;
		width: 30%;
		height: 100%;
		gap: .5em;

		text-align: center;
		font-family: "Quicksand", sans-serif;
		font-size: 1.75rem;
	}
	.logo {
		margin: 40% 0 10% 0; /* FIXME */
	}
	.text-shadow {
		text-shadow:
			black 0 0 5px,
			black 0 0 2px;
	}
</style>

<body>
	<header>
		{% include 'nav.liquid' %}
	</header>	
	<main>
		<div class="main-wrapper">
			<div class="main-col">
				<img src="img/Logo.svg" alt="Wild Weald Studio" class="logo"/>
				<p class="font-white text-shadow">
					Broken shards <br/>
					reknit into <br/>
					vibrant art
				</p>
				<p class="font-yellow font-bold text-shadow">
					Artisinal stained glass <br/>
					and threadcraft <br/>
					from the woods <br/>
					in Durham, North Carolina
				</p>
			</div>
			<img src="/img/home-bg.jpg" alt="Holly Harris crafting glass in her workshop" class="hero"/>
		</div>
	</main>
</body>
