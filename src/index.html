---
layout: layouts/page.liquid
---

<style>
	main {
		display: flex;
		flex-direction: column;
		justify-content: center;
	}
	.main-wrapper {
		position: relative;
		width: min(100%, calc(100vh * 2480 / 1857));
		container-type: inline-size;
	}
	.hero {
		width: 100%;
		height: auto;
		display: block;
	}
	.main-col {
		position: absolute;
		display: flex;
		flex-direction: column;
		z-index: 1;

		height: 100%;
		gap: .5em;

		text-align: center;
		font-family: "Quicksand", sans-serif;
		font-size: 2.25cqw;
	}
	.logo {
		margin: 40% 0 10% 0;
	}
	.text-shadow {
		text-shadow:
			black 0 0 5px,
			black 0 0 2px;
	}
	@media (width > 768px) {
		.main-col {
			margin-left: 60%;
			width: 30%;
		}
	}
	@media (max-width: 768px) {
		.main-wrapper {
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		.hero {
			width: 100%;
			height: 100%;
			object-fit: cover;
			object-position: right center;
		}
		.main-col {
			width: 100%;
			font-size: 4cqw;
		}
		.logo {
			width: 50%;
			margin: 10% auto 5% auto;
		}
	}
</style>

<div class="main-wrapper">
	<div class="main-col">
		<img src="img/Logo.svg" alt="Wild Weald Studio" class="logo"/>
		<p class="font-white text-shadow">
			Broken shards <br/>
			reknit into <br/>
			vibrant art
		</p>
		<p class="font-chartreuse font-bold text-shadow">
			Artisinal stained glass <br/>
			and threadcraft <br/>
			from the woods <br/>
			in Durham, North Carolina
		</p>
	</div>
	<img src="/img/home-bg.jpg" alt="Holly Harris crafting glass in her workshop" class="hero"/>
</div>
